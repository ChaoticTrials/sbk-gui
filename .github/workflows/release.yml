name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-13
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName:      v__VERSION__
          releaseName:  "SBK Archive Viewer v__VERSION__"
          releaseBody:  ''
          releaseDraft: false
          prerelease:   false
          args:         ${{ matrix.args }}

      - name: Upload constant-name AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE" "sbk-gui-x86_64.AppImage"
          gh release upload "${{ github.ref_name }}" "sbk-gui-x86_64.AppImage" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  apt-repo:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout apt-repo
        uses: actions/checkout@v6
        with:
          repository: ChaoticTrials/apt-repo
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Install aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Download .deb from release
        run: gh release download ${{ github.ref_name }} --pattern "*.deb" --dir debs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build apt repo with aptly
        run: |
          mkdir -p apt-repo/public
          cat > ~/.aptly.conf <<EOF
          {
            "FileSystemPublishEndpoints": {
              "apt-repo": {
                "rootDir": "${GITHUB_WORKSPACE}/apt-repo/public",
                "linkMethod": "copy"
              }
            }
          }
          EOF
          aptly repo create -distribution=stable -component=main sbk-gui 2>/dev/null || true
          aptly repo add sbk-gui debs/*.deb
          aptly snapshot create sbk-gui-${{ github.ref_name }} from repo sbk-gui
          aptly publish snapshot \
            -gpg-key=${{ secrets.GPG_KEY_ID }} \
            -passphrase="${{ secrets.GPG_PASSPHRASE }}" \
            -architectures=amd64,arm64 \
            sbk-gui-${{ github.ref_name }} \
            filesystem:apt-repo:sbk-gui

      - name: Commit and push updated apt-repo
        working-directory: apt-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release sbk-gui ${{ github.ref_name }}"
          git push
